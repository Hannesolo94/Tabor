<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>TABOR · Spray-Paint Wordmark Study</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@500;700;800;900&family=Archivo+Black&family=Anton&family=Bungee&family=Black+Ops+One&family=Permanent+Marker&family=Protest+Guerrilla&family=Rubik+Spray+Paint&family=Rubik+Wet+Paint&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Cinzel:wght@500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="tokens.css"/>
<style>
  html, body, #root { margin:0; padding:0; height:100%; }
  body { background:#f0eee9; font-family:Inter, system-ui, sans-serif; -webkit-font-smoothing:antialiased; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<!-- Procedural spray/grit filters (referenced via CSS filter:url()) -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <filter id="spray-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="2" seed="4" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="3" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="spray-bleed" x="-30%" y="-30%" width="160%" height="160%">
      <feTurbulence type="fractalNoise" baseFrequency="0.5 0.9" numOctaves="2" seed="8" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="5" xChannelSelector="R" yChannelSelector="G" result="d"/>
      <feGaussianBlur in="d" stdDeviation="0.35"/>
    </filter>
    <filter id="rough-edge" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="turbulence" baseFrequency="0.06 0.12" numOctaves="3" seed="2" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="2.4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="erode" x="-20%" y="-20%" width="140%" height="140%">
      <feMorphology operator="erode" radius="0.4" result="e"/>
      <feTurbulence type="fractalNoise" baseFrequency="0.4 0.7" numOctaves="2" seed="5" result="n"/>
      <feDisplacementMap in="e" in2="n" scale="3" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
</svg>

<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tabor-marks.jsx"></script>
<script type="text/babel" src="tabor-type.jsx"></script>
<script type="text/babel" src="tabor-type-app.jsx"></script>
</body>
</html>
