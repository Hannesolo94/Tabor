# Supabase project config. project_id is the linked project ref.
project_id = "bceysfguycepothnwvmu"

[db]
port = 54322
major_version = 15

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://tabor.quest"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false

# OAuth for the app stores (Apple/Google). Secrets come from env at deploy time.
[auth.external.google]
enabled = false
[auth.external.apple]
enabled = false

[realtime]
enabled = true

# Edge Functions. JWT-verified by default; the scheduled rollover runs with the
# service role, so its verify_jwt is turned off (protect it with a cron secret).
[functions.system-chat]
verify_jwt = true
[functions.printful-products]
verify_jwt = true
[functions.printful-order]
verify_jwt = true
[functions.daily-rollover]
verify_jwt = false
[functions.delete-account]
verify_jwt = true
